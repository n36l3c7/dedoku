name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run the test suite
        run: python -m unittest discover -s tests -v

  quality:
    name: Lint, types, coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install quality tools
        run: python -m pip install ruff mypy coverage
      - name: Ruff
        run: python -m ruff check dedoku tests benchmark
      - name: Mypy
        run: python -m mypy dedoku
      - name: Coverage (fail under 95%)
        run: |
          python -m coverage run -m unittest discover -s tests
          python -m coverage report --include="dedoku/*" --fail-under=95
